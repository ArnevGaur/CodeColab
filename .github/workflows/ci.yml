name: CodeColab CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 18.x
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'
    
    # Install all dependencies (root includes server deps)
    - name: Install dependencies
      run: npm install

    # Backend Tests
    - name: Install backend-only dependencies
      run: cd server && npm install
    - name: Run backend tests
      run: cd server && npm test

    # Frontend Build
    - name: Build frontend
      run: npm run build
